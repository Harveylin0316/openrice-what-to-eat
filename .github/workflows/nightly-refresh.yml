name: map-data-refresh

# 自動把地圖資料刷到最新並部署——「checker 掃完即時上，不用手動」。
#
# 分工（因 OpenRice WAF 擋機房 IP，爬蟲只能在住宅 IP 跑）：
#   1) 爬新資料：你本機/24hr 電腦跑 openrice-google-sync-checker 的 daily_closure_check.py
#      → commit 最新 data/openrice.db 到 checker repo（住宅 IP，這步在你那邊）
#   2) 變成地圖 + 部署（本 workflow，純 SQLite→JSON，雲端跑得動）：
#      每 15 分鐘抓 checker 最新 db → 比對雜湊，db 有變才重生 map_pins /
#      partner_overlay / external_pois → commit → Netlify 自動部署
#
# 更新節奏（餐廳資料一天變一次，不需高頻輪詢）：
#   - 每日排程一次（05:00 台北）自動抓 checker 最新 db；比對 .github/last-checker-db.sha，
#     db 有變才重生+部署，沒變就跳過（不會產生重複 commit / 部署）。
#   - 想「掃完即時上、不等隔天排程」：本機 commit db 後打 repository_dispatch(checker-updated)
#     （run_daily_local.sh 設 APP_DISPATCH_TOKEN 即會自動打），本 workflow 立刻跑一次、同樣走雜湊閘。
#
# ⚙️ 一次性設定：Settings → Secrets and variables → Actions 新增
#   CHECKER_TOKEN = 對 harveylin0316/openrice-google-sync-checker 有 Contents:Read 的 fine-grained PAT。

on:
  schedule:
    - cron: '0 21 * * *'    # 每日 21:00 UTC = 05:00 台北（雜湊沒變就跳過）
  workflow_dispatch: {}
  repository_dispatch:
    types: [checker-updated]

permissions:
  contents: write

concurrency:
  group: map-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout app repo (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch latest checker DB
        uses: actions/checkout@v4
        with:
          repository: harveylin0316/openrice-google-sync-checker
          token: ${{ secrets.CHECKER_TOKEN }}
          path: _checker
          sparse-checkout: data/openrice.db
          sparse-checkout-cone-mode: false

      - name: Verify DB present
        run: |
          if [ ! -f _checker/data/openrice.db ]; then
            echo "::error::抓不到 checker 的 openrice.db（檢查 CHECKER_TOKEN 權限與 db 是否已 commit）"
            exit 1
          fi
          ls -lh _checker/data/openrice.db

      - name: Gate on DB change
        id: gate
        run: |
          NEW=$(sha256sum _checker/data/openrice.db | awk '{print $1}')
          OLD=$(cat .github/last-checker-db.sha 2>/dev/null || echo none)
          echo "new_sha=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$NEW" = "$OLD" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "checker db 未變（$NEW），跳過重生與部署"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "checker db 有更新：$OLD → $NEW"
          fi

      - name: Setup Python
        if: steps.gate.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate map data from fresh DB
        if: steps.gate.outputs.changed == 'true'
        run: |
          DB=_checker/data/openrice.db
          python3 export_checker_overlay.py --db "$DB"
          # 灰點（未合作 POI）暫時凍結，維持既有 external_pois.json 不重生。
          # 原因：checker db 自 2026-07-20 併入全站 catalog（3,099→48,165 家）後，
          # export_external_pois.py 沒有品質門檻，重生會讓灰點從 1,251 → 24,063 家，
          # 灌爆地圖並拖慢 LINE WebView 載入。Owner 決定灰點維持現狀、只更新彩色合作店。
          # 要恢復：先在 export_external_pois.py 加 bookmark_count 門檻（>=50 約 1,724 家）再取消註解。
          # python3 export_external_pois.py   --db "$DB"
          python3 generate_map_pins.py

      - name: Commit & push
        if: steps.gate.outputs.changed == 'true'
        run: |
          echo "${{ steps.gate.outputs.new_sha }}" > .github/last-checker-db.sha
          git config user.name  "map-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add frontend/liff/data/map_pins.json \
                  frontend/liff/data/photos.json \
                  frontend/liff/data/partner_overlay.json \
                  frontend/liff/data/external_pois.json \
                  .github/last-checker-db.sha
          if git diff --cached --quiet; then
            echo "資料無變化，跳過 commit"
          else
            STAMP=$(date -u +%Y-%m-%dT%H:%MZ)
            git commit -m "資料刷新（checker $STAMP）：座標/名稱/評分/照片/優惠 + 歇業下架 + deeplink"
            git push origin main
            echo "✅ 已推送，Netlify 自動部署"
          fi
