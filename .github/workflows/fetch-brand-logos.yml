name: brand-logos-fetch

# 品牌官方 logo 抓取（開發沙箱網路政策擋外部下載，Actions runner 有公網）。
# push 動到腳本即觸發（App 無 workflow_dispatch 權限，沿用 landmarks 模式）。

on:
  push:
    branches: [main]
    paths: ['fetch_brand_logos.py']

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pillow
      - run: python3 fetch_brand_logos.py
      - name: Commit & push
        run: |
          git config user.name  "map-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add frontend/liff/img/brands/
          if git diff --cached --quiet; then
            echo "logo 無變化，跳過 commit"
          else
            git commit -m "資料刷新（brand logos）：官方品牌 logo"
            git push origin main
          fi
