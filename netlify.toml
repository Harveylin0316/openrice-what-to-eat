[build]
  # 發布目錄（Web App 文件）
  publish = "frontend/web"

  # 構建命令：將數據庫文件複製到函數目錄，確保函數可以訪問
  command = "bash netlify-build.sh"

[build.environment]
  # 停車 function 用 global fetch（Node 18+ 才有）；固定版本避免預設漂移
  NODE_VERSION = "20"

# LIFF 的 JS/HTML 每次都跟伺服器驗證（ETag），避免 LINE webview 服務舊版
# → 修好的程式部署後用戶就拿得到，不會卡在快取的舊版（用戶回報「卡在正在連線 LINE」）
[[headers]]
  for = "/liff/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Leaflet 是版本釘死的第三方庫（vendor/，1.9.4 永不變）→ 長快取 immutable，
# 免每次開 app 都對這 195K 發條件式重新驗證。更具體規則放在 /liff/* 之後 → 覆蓋它。
[[headers]]
  for = "/liff/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 地圖資料（map_pins/external_pois，隨每日刷新/部署變）→ 短快取：重複開 app 命中快取，
# 落後窗口僅 5 分鐘（資料一天才更新一次，可接受），省下每次開 app 重驗證 500K+。
[[headers]]
  for = "/liff/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

# 版本化資源長快取：pages/*.js 與 map.css 永遠以 ?v=rN 引用（index.html 單一來源），
# 新版本＝新 URL 必重抓，舊 URL 內容不變 → immutable 安全，回訪省掉逐檔 revalidate RTT。
# shared/*.js 為「無版本參數」import，不可長快取（維持 /liff/* 的 must-revalidate）。
[[headers]]
  for = "/liff/pages/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/liff/map.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Functions 配置
[functions]
  # Functions 目錄
  directory = "netlify/functions"

# 排程：每分鐘背景刷新台北即時停車空位到 Netlify Blobs（parking function 讀 Blobs → 每個使用者都快、資料 ≤1 分新鮮）
[functions."refresh-parking"]
  schedule = "* * * * *"

# 重定向規則（將 API 請求重定向到 Functions）
# 將所有 /api/restaurants/* 請求重定向到 Netlify Function
[[redirects]]
  from = "/api/restaurants/*"
  to = "/.netlify/functions/restaurants"
  status = 200
  force = true

# 台北市即時停車位（餐廳卡「附近停車」用）
[[redirects]]
  from = "/api/parking/*"
  to = "/.netlify/functions/parking"
  status = 200
  force = true

# 將所有 /api/lottery/* 請求重定向到 Netlify Function
[[redirects]]
  from = "/api/lottery/*"
  to = "/.netlify/functions/lottery"
  status = 200
  force = true

# 將所有 /api/admin/* 請求重定向到 Netlify Function
[[redirects]]
  from = "/api/admin/*"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

# LINE Webhook
[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/webhook"
  status = 200
  force = true

# 用戶行為追蹤
[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200
  force = true

# 公開入口統一導向 LIFF 好康地圖。force=true 是必要的：publish 目錄本身有
# index.html，若不強制，Netlify static-file shadowing 會繼續顯示舊版首頁。
[[redirects]]
  from = "/"
  to = "/liff/"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/liff/"
  status = 301
  force = true

[[redirects]]
  from = "/index"
  to = "/liff/"
  status = 301
  force = true

# LIFF App SPA 路由支持
# 將所有 /liff/* 請求重定向到 /liff/index.html，以支持子目錄路由
# 例如：/liff/home, /liff/favorites 等都會返回 /liff/index.html
[[redirects]]
  from = "/liff/*"
  to = "/liff/index.html"
  status = 200

# 其他不存在的公開網址也回到 LIFF；不使用 force，保留 /admin/ 與既有靜態資源。
# API 與 /liff/* 的規則必須放在這條 catch-all 前面（Netlify 採第一條命中規則）。
[[redirects]]
  from = "/*"
  to = "/liff/"
  status = 301
